<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="css/style.css">
  <title>Graphes Temporels</title>
</head>
<body>

  <div class="sidebar">
    <div class="graph-label">Graphe temporel</div>
    <div id="graphContainer"></div>
    <div class="graph-label">Snapshot éditable</div>
    <div id="snapshotGraphContainer"></div>
    <div id="spinboxContainer">N = </div>
    <div id="connexityIndicator">
      <span id="connexityDot"></span>
      <span id="connexityText">non connexe</span>
    </div>
    <button id="addBtn" data-tooltip="Ajouter une snapshot (Ctrl+Shift+A)">ADD</button>
    <button id="backBtn" data-tooltip="Revenir à la snapshot précédente (Ctrl+Z)">BACK</button>
    <button id="saveBtn" data-tooltip="Sauvegarder une session (Ctrl+Shift+S)">SAVE</button>
    <button id="loadBtn" data-tooltip="Charger une session (Ctrl+Shift+O)">LOAD</button>
    <input type="file" id="fileInput" style="display: none;" accept=".json" />
  </div>

  <div class="main">
    <div id="canvasContainer">
      <div id="zoom-indicator">100%</div>
      <div id="save-indicator">Session sauvegardée</div>
      <div id="load-indicator">Session chargée</div>
    </div>
    <div id="snapshotBar">
      <div id="emptyMessage">Aucune snapshot pour le moment.</div>
    </div>
  </div>

  <div id="modalOverlay" class="hidden">
    <div id="modalBox">
      <p>Voulez-vous vraiment revenir à la snapshot précédente ?</p>
      <div id="modalButtons">
        <button id="btnConfirm" class="enabled">Confirmer</button>
        <button id="btnCancel" class="enabled">Annuler</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5/lib/p5.min.js"></script>

  <script src="src/Button.js"></script>
  <script src="src/Subset.js"></script>
  <script src="src/Table.js"></script>
  <script src="src/util.js"></script>
  <script src="src/Graph.js"></script>
  <script src="src/Lattice.js"></script>
  <script src="src/sketch.js"></script>
</body>
</html>
